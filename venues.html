<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venues | Great Slab Productions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo-container">
                <img src="logo.png" alt="Great Slab Productions Logo" style="height: 100px; width: auto; display: block;">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="venues.html" class="active">Venues</a></li>
                <li><a href="artists.html">Artists</a></li>
                <li><a href="contact.html">Booking</a></li>
            </ul>
        </nav>

        <main>
            <h1>Zero-Risk Event Sourcing.</h1>
            <p class="subtitle">We take the administrative, promotional, and financial liabilities completely off your plate. Submit your room specs to schedule a routing consult.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="d332babf-e81d-4b8d-9658-af112f1e1b11">
                <input type="hidden" name="subject" value="[Venue Routing Consult] New Inquiry">
                <input type="hidden" name="from_name" value="Great Slab Venue Portal">

                <div class="form-group">
                    <label for="venue-name">Venue Name</label>
                    <input type="text" id="venue-name" name="Venue Name" required placeholder="e.g., The Dark Room">
                </div>

                <div class="form-group">
                    <label for="location">Location / City</label>
                    <input type="text" id="location" name="Location" required placeholder="e.g., Preston, Lancashire">
                </div>

                <div class="form-group">
                    <label for="capacity">Safe Technical Capacity</label>
                    <input type="number" id="capacity" name="Technical Capacity" required placeholder="e.g., 120">
                </div>

                <div class="form-group">
                    <label for="pa-system">In-House PA System Status</label>
                    <select id="pa-system" name="PA System Status" required>
                        <option value="" disabled selected>Select PA infrastructure option...</option>
                        <option value="Full in-house PA installed">Full Professional In-House PA Installed</option>
                        <option value="Vocal PA only">Vocal PA Only (Requires external reinforcement)</option>
                        <option value="No PA system">No PA System (Promoter must supply production)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="engineer">Sound Engineer Provision</label>
                    <select id="engineer" name="Sound Engineer Provision" required>
                        <option value="" disabled selected>Is an engineer included in baseline terms?</option>
                        <option value="House engineer included">Yes - Qualified house engineer included</option>
                        <option value="Dry hire - no engineer">No - Dry room hire only (External engineer required)</option>
                    </select>
                </div>

                <button type="submit" class="btn">Submit Routing Inquiry</button>
            </form>
        </main>

        <footer>&copy; 2026 Great Slab Productions. All Rights Reserved.</footer>
    </div>
</body>
</html>
